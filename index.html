<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>铆聦聦毛搂聢铆聥掳铆聛卢 矛搂聞铆聳聣铆聵聞铆聶漏</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555;
  --color-text-tertiary: #888;
  --color-background-primary: #fff;
  --color-background-secondary: #f5f5f5;
  --color-border-tertiary: #e5e5e5;
  --color-border-secondary: #d0d0d0;
  --color-border-primary: #1a1a1a;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --color-accent: #e8734a;
  --color-accent-light: #fef3ee;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
body { background: #f7f7f6; font-family: var(--font-sans); }
.wrap { padding: 1.5rem; max-width: 1300px; margin: 0 auto; }

.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; }
.header-left h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); line-height: 1.2; }
.header-left p { font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; }
.nav-pills { display: flex; gap: 4px; background: var(--color-background-secondary); padding: 3px; border-radius: var(--border-radius-md); }
.pill { padding: 5px 14px; font-size: 13px; border: none; background: transparent; cursor: pointer; border-radius: 6px; color: var(--color-text-secondary); transition: all .15s; white-space: nowrap; }
.pill.on { background: #fff; color: var(--color-text-primary); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }

.kpi-row { display: grid; grid-template-columns: repeat(6,minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
.kpi { background: #fff; border-radius: var(--border-radius-md); padding: 14px 16px; }
.kpi-label { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-val { font-size: 26px; font-weight: 500; line-height: 1; color: var(--color-text-primary); }
.kpi-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }

.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.toolbar select { font-size: 13px; padding: 5px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: #fff; color: var(--color-text-primary); cursor: pointer; }
.csv-btn { margin-left: auto; display: flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.csv-btn:hover { background: var(--color-background-secondary); }

/* 矛鹿麓铆聟聦锚鲁聽毛娄卢 */
.cat-section { margin-bottom: 24px; }
.cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 4px; }
.cat-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); }
.cat-actions { display: flex; gap: 6px; }
.btn-cat-edit { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; background: #fff; color: var(--color-text-secondary); cursor: pointer; }
.btn-cat-edit:hover { background: var(--color-background-secondary); }
.btn-add-prod { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; background: #fff; color: var(--color-text-secondary); cursor: pointer; }
.btn-add-prod:hover { background: var(--color-background-secondary); }

/* 矛聽聹铆聮聢 矛鹿麓毛聯聹 */
.product-card { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 8px; overflow: hidden; }
.product-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fafafa; border-bottom: 0.5px solid var(--color-border-tertiary); }
.product-header-drag { color: #ccc; cursor: grab; font-size: 14px; flex-shrink: 0; }
.product-name { font-size: 13px; font-weight: 600; color: var(--color-text-primary); flex: 1; }
.product-prog { display: flex; align-items: center; gap: 6px; }
.prod-pct { font-size: 12px; font-weight: 500; min-width: 28px; text-align: right; }
.prod-track { width: 50px; height: 3px; background: var(--color-border-tertiary); border-radius: 2px; overflow: hidden; }
.prod-fill { height: 100%; border-radius: 2px; }
.product-actions { display: flex; gap: 4px; }
.btn-prod-edit { font-size: 11px; padding: 3px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: 5px; background: #fff; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.btn-prod-edit:hover { background: var(--color-background-secondary); }
.btn-add-row { font-size: 11px; padding: 3px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: 5px; background: #fff; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.btn-add-row:hover { background: var(--color-background-secondary); }
.btn-del-prod { font-size: 11px; padding: 3px 8px; border: 0.5px solid #f5c4b8; border-radius: 5px; background: #fff; color: var(--color-accent); cursor: pointer; }
.btn-del-prod:hover { background: var(--color-accent-light); }

/* 铆聳聣 */
.row-item { display: flex; align-items: center; border-top: 0.5px solid var(--color-border-tertiary); transition: background .1s; cursor: pointer; }
.row-drag { cursor: grab; }
.row-edit-btn { cursor: pointer; }
.row-item:hover { background: #fafafa; }
.row-item.drag-over { background: #e8f4fd; }
.row-item.dragging { opacity: 0.4; }
.row-drag { color: #d0d0d0; cursor: grab; padding: 10px 8px 10px 12px; font-size: 13px; flex-shrink: 0; line-height: 1; }
.row-stage { font-size: 13px; color: var(--color-text-primary); width: 100px; padding: 10px 8px; flex-shrink: 0; box-sizing: border-box; }
.row-sub { font-size: 12px; color: var(--color-accent); width: 64px; padding: 10px 8px; flex-shrink: 0; box-sizing: border-box; text-align: center; }
.row-badge-wrap { flex-shrink: 0; width: 88px; padding: 10px 8px; box-sizing: border-box; text-align: center; }
.row-date { font-size: 12px; color: var(--color-text-tertiary); width: 84px; padding: 10px 8px; flex-shrink: 0; box-sizing: border-box; text-align: center; }
.row-vendor { font-size: 12px; color: var(--color-text-tertiary); width: 80px; padding: 10px 4px; flex-shrink: 0; }
.row-manager { font-size: 12px; color: var(--color-text-tertiary); width: 64px; padding: 10px 4px; flex-shrink: 0; }
.row-note { font-size: 11px; color: var(--color-text-tertiary); width: 72px; padding: 10px 8px; flex-shrink: 0; box-sizing: border-box; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-memo { font-size: 11px; color: var(--color-text-tertiary); width: 180px; padding: 10px 8px; flex-shrink: 0; box-sizing: border-box; text-align: center; white-space: normal; word-break: break-word; line-height: 1.4; }

/* 矛聺赂毛聺录矛聺赂 铆聝聙矛聻聞毛聺录矛聺赂 毛掳聰 */
.row-tl-wrap {
  flex: 1;
  min-width: 120px;
  padding: 0 10px;
  position: relative;
  height: 36px;
  display: flex;
  align-items: center;
}
.row-tl-track {
  width: 100%;
  height: 12px;
  background: var(--color-background-secondary);
  border-radius: 3px;
  position: relative;
  overflow: visible;
}
/* 矛聵陇毛聤聵 锚赂掳矛陇聙矛聞聽 */
.row-tl-today {
    position: absolute;
    top: -5px;
    width: 0;
    height: 0;
    margin-left: -3.5px;
    border-left: 3.5px solid transparent;
    border-right: 3.5px solid transparent;
    border-top: 5px solid #e05c3a;
    background: transparent;
    z-index: 3;
}
/* 锚掳聞铆聤赂 毛掳聰 */
.row-tl-bar {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 3px;
  z-index: 1;
}

/* 铆聨赂矛搂聭/矛聜颅矛聽聹 毛虏聞铆聤录 */
.row-edit-btn { display: inline-flex; align-items: center; gap: 5px; background: #fff; border: 1px solid var(--color-border-secondary); cursor: pointer; padding: 5px 11px; color: var(--color-text-secondary); font-size: 12px; line-height: 1; border-radius: 8px; flex-shrink: 0; margin-left: 10px; white-space: nowrap; width: 58px; justify-content: center; }
.row-edit-btn:hover { background: #fff5f0; border-color: #e8734a; color: #e8734a; }
.row-del-btn { background: transparent; border: none; cursor: pointer; padding: 6px 5px; color: #ccc; font-size: 12px; border-radius: 4px; flex-shrink: 0; margin-right: 4px; }
.row-del-btn:hover { color: var(--color-accent); background: var(--color-accent-light); }

/* 毛掳掳矛搂聙 */
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.b-done { background: #EAF3DE; color: #27500A; }
.b-wip { background: #E6F1FB; color: #0C447C; }
.b-tbd { background: #F1EFE8; color: #5F5E5A; }
.b-soon { background: #FFF3DC; color: #9A6B11; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: #3B6D11; }
.dot-wip { background: #185FA5; }
.dot-tbd { background: #888780; }
.dot-soon { background: #D9970F; }
.b-none { background: #FEE2E2; color: #991B1B; }
.dot-none { background: #DC2626; }

/* 毛陋篓毛聥卢 */
#modal-wrap,#cat-modal-wrap,#prod-modal-wrap,#row-modal-wrap { position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center; }
#modal-wrap.hidden,#cat-modal-wrap.hidden,#prod-modal-wrap.hidden,#row-modal-wrap.hidden { display:none; }
.modal-bg { background:rgba(0,0,0,0.4);position:fixed;inset:0;display:flex;align-items:center;justify-content:center; }
.modal-box { background:#fff;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;width:340px;max-width:100%;max-height:85vh;overflow-y:auto;position:relative;z-index:1; }
.modal-box h3 { font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;padding-bottom:10px;border-bottom:0.5px solid var(--color-border-tertiary); }
.field { margin-bottom:10px; }
.field label { display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em; }
.field select,.field input,.field textarea { width:100%;padding:7px 9px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:#fff;color:var(--color-text-primary);box-sizing:border-box; }
.field textarea { resize:vertical;font-family:inherit;min-height:48px; }
.modal-footer { display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary); }
.btn-sec { padding:6px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-primary); }
.btn-pri { padding:6px 14px;font-size:13px;border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);background:var(--color-text-primary);color:#fff;cursor:pointer; }
.hidden { display:none; }
/* 矛禄卢毛聼录 铆聴陇毛聧聰 铆聳聣 */
.col-header {
  display: flex;
  align-items: center;
  width: 100%;
  min-width: 100%;
  box-sizing: border-box;
  border-top: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-secondary);
}
.col-header-cell {
  font-size: 10px;
  font-weight: 600;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: .04em;
  padding: 6px 8px;
  white-space: nowrap;
  flex-shrink: 0;
  box-sizing: border-box;
}
.card-rows { display: block; width: 100%; }

/* === redesign additions === */
.header { align-items: flex-start; }
.header-sub { color: var(--color-text-tertiary); font-size: 13px; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.badge-today { background: #fbe4e4; color: #c0392b; }
.badge-live { background: #e6f4ea; color: #1e7e34; }
.btn-addprod { background: #fff; border: 1px solid var(--color-border-secondary); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--color-text-primary); }
.btn-addprod:hover { background: var(--color-background-secondary); }
.btn-save { background: var(--color-text-primary); border: 1px solid var(--color-border-primary); border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #fff; font-weight: 500; transition: opacity .15s; }
.btn-save:hover { opacity: 0.82; }
.btn-save.saved { background: #2e7d32; border-color: #2e7d32; }

/* === inline cell editor popover === */
.cell-pop { position:fixed; z-index:2000; background:#fff; border:1px solid #d0d0d0; border-radius:8px; padding:10px 12px; box-shadow:0 4px 16px rgba(0,0,0,.13); min-width:160px; max-width:260px; }
.cell-pop-title { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:.04em; margin-bottom:7px; font-weight:600; }
.cell-pop select, .cell-pop input { width:100%; padding:5px 8px; font-size:13px; border:0.5px solid #d0d0d0; border-radius:6px; background:#fff; color:#1a1a1a; box-sizing:border-box; }
.cell-pop-foot { display:flex; justify-content:flex-end; gap:6px; margin-top:9px; }
.cell-pop-ok { padding:4px 12px; font-size:12px; background:#1a1a1a; color:#fff; border:none; border-radius:5px; cursor:pointer; }
.cell-pop-cancel { padding:4px 10px; font-size:12px; background:transparent; border:0.5px solid #d0d0d0; border-radius:5px; cursor:pointer; color:#555; }
.row-item [data-field] { cursor:pointer; }
.row-item [data-field]:hover { outline:1.5px dashed #bbb; border-radius:3px; }
.catfilter { display: flex; gap: 6px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
.catpill { background: #fff; border: 1px solid var(--color-border-tertiary); border-radius: 999px; padding: 6px 16px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); }
.catpill:hover { background: var(--color-background-secondary); }
.catpill.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
.catpill-add { color: var(--color-text-tertiary); border-style: dashed; }

.legendbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.legend { display: flex; gap: 14px; align-items: center; }
.lg { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); }
.lg-sw { display: inline-block; width: 11px; height: 11px; border-radius: 2px; }
.legend-right { display: flex; align-items: center; gap: 10px; }
.hint { font-size: 12px; color: var(--color-text-tertiary); }
.sf-hidden { font-size: 12px; border: 1px solid var(--color-border-tertiary); border-radius: 6px; padding: 4px 8px; color: var(--color-text-secondary); }


/* === timeline date axis header === */
.tl-axis-cell { display: flex; align-items: center; }
.tl-axis { position: relative; width: 100%; height: 14px; padding: 0 10px; box-sizing: border-box; display: block; }
.tl-axis-inner { position: relative; display: block; width: 100%; height: 100%; }
.tl-axis-start { position: absolute; left: -10px; top: 0; transform: translateX(-50%); font-size: 10px; color: var(--color-text-tertiary); white-space: nowrap; }
.tl-axis-end { position: absolute; right: -10px; top: 0; transform: translateX(50%); font-size: 10px; color: var(--color-text-tertiary); white-space: nowrap; }
.tl-axis-legend { position: absolute; left: 50%; top: 0; transform: translateX(-50%); display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--color-text-tertiary); white-space: nowrap; }
.tl-axis-legend-tri { width: 0; height: 0; border-left: 3.5px solid transparent; border-right: 3.5px solid transparent; border-top: 5px solid #e05c3a; }

.edit-ico { font-size: 11px; }

/* product collapse toggle */
.prod-chevron { display: inline-block; margin-right: 6px; font-size:14px; color: var(--color-text-tertiary); transition: transform 0.15s ease; }
.product-card.collapsed .prod-chevron { transform: rotate(-90deg); }
.product-card.collapsed .card-rows { display: none; }
/* product drag-over highlight */
.product-card.prod-drag-over { outline: 2px dashed #e8734a; background: #fff8f5; }

</style>
</head>

<h2 class="sr-only">铆聦聦毛搂聢铆聥掳铆聛卢 矛聽聹铆聮聢 矛搂聞铆聳聣铆聵聞铆聶漏 锚麓聙毛娄卢</h2>

<div class="wrap">
  <div class="header">
    <div class="header-left">
      <h1>铆聦聦毛搂聢铆聥掳铆聛卢 矛搂聞铆聳聣铆聵聞铆聶漏</h1>

  <div class="legendbar">

      <span class="lg"><i class="lg-sw" style="background:#ccc"></i>毛炉赂矛聽聲</span>
      <span class="lg"><i class="lg-sw" style="background:#DC2626"></i>毛炉赂矛搂聞铆聳聣</span>
            <span class="lg"><i class="lg-sw" style="background:#e03131"></i>矛聵陇毛聤聵</span>

  <div id="list"></div>
</div>

<div id="modal-wrap" class="hidden">

      <div class="field"><label>铆聵聞铆聶漏</label>
        <select id="e-status"><option>矛搂聞铆聳聣矛聵聢矛聽聲</option><option>矛搂聞铆聳聣矛陇聭</option><option>矛聶聞毛拢聦</option><option>毛炉赂矛聽聲</option><option>毛炉赂矛搂聞铆聳聣</option></select>
      </div>
      <div class="field" id="f-order" style="display:none"><label>毛掳聹矛拢录矛聺录</label><input type="date" id="e-order" min="1000-01-01" max="9999-12-31"></div>

function tlAxis(range){
  if(!range){
    return '<span class="col-header-cell tl-axis-cell" style="flex:1;white-space:nowrap">铆聝聙矛聻聞毛聺录矛聺赂</span>';
  }
  const fmt = d => (d.getMonth()+1)+'/'+d.getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const totalMs = (range.max - range.min) || 86400000;
  let tp = ((today - range.min) / totalMs * 100);
  tp = Math.max(0, Math.min(100, tp));
  const showToday = (today >= range.min && today <= range.max);
  return `<span class="col-header-cell tl-axis-cell" style="flex:1">
        <span class="tl-axis">
          <span class="tl-axis-inner">
            <span class="tl-axis-start">${fmt(range.min)}</span>
                        ${showToday ? `<span class="tl-axis-legend"><span class="tl-axis-legend-tri"></span>= 矛聵陇毛聤聵</span>` : ''}
            <span class="tl-axis-end">${fmt(range.max)}</span>
          </span>
        </span>
      </span>`;
}
function getGlobalDateRange(){
const dates=[];
const today=new Date(); today.setHours(0,0,0,0);
data().forEach(prod=>{
prod.r.forEach(r=>{
// 矛聶聞毛拢聦 铆聲颅毛陋漏矛聺聙 毛虏聰矛聹聞 锚鲁聞矛聜掳矛聴聬矛聞聹 矛聽聹矛聶赂
if((r.st||'毛炉赂矛聽聲')==='矛聶聞毛拢聦') return;
if(r.d1)dates.push(new Date(r.d1));
if(r.o)dates.push(new Date(r.o));
if(r.d2)dates.push(new Date(r.d2));
});
});
const valid=dates.filter(d=>!isNaN(d));
// 毛聜聽矛搂聹 矛聻聢毛聤聰 铆聲颅毛陋漏矛聺麓 矛聴聠矛聹录毛漏麓 矛聵陇毛聤聵 锚赂掳矛陇聙 脗卤30矛聺录
if(!valid.length){
return {min:new Date(today.getTime()-30*86400000), max:new Date(today.getTime()+30*86400000)};
}
valid.push(today);
const min=new Date(Math.min(...valid));
const max=new Date(Math.max(...valid));
const span=max-min || 86400000;
const pad=Math.max(span*0.05, 3*86400000);
return {min:new Date(min.getTime()-pad), max:new Date(max.getTime()+pad)};
}
function getProdDateRange(prod){
  const dates=[];
  prod.r.forEach(r=>{
    if(r.d1)dates.push(new Date(r.d1));
    if(r.o)dates.push(new Date(r.o));
    if(r.d2)dates.push(new Date(r.d2));
  });
  const valid=dates.filter(d=>!isNaN(d));
  if(!valid.length)return null;
  return {min:new Date(Math.min(...valid)), max:new Date(Math.max(...valid))};
}

d.forEach(prod=>{prod.r.forEach(r=>{rows.push(tab==='dev'?[prod.p,prod.category,r.c,r.s,r.st,r.d1,r.d2,r.v,r.m]:[prod.p,prod.category,r.sg,r.st,r.o,r.d2,r.v,r.m]);});});

}

/* ===== localStorage 矛聽聙矛聻楼/毛隆聹毛聯聹 ===== */
const STORAGE_KEY = 'pharmatique_data';

function saveData() {
const payload = { DEV: DEV, PROD: PROD, CATEGORIES: CATEGORIES, COLLAPSED: Array.from(collapsedProds) };
localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
const btn = document.getElementById('btn-save');
if (btn) {
const orig = btn.textContent;
btn.textContent = '芒聹聯 矛聽聙矛聻楼矛聶聞毛拢聦';
btn.classList.add('saved');
setTimeout(() => { btn.textContent = orig; btn.classList.remove('saved'); }, 1800);
}
}

function loadData() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
if (!raw) return false;
const payload = JSON.parse(raw);
if (payload.DEV) { DEV.length = 0; payload.DEV.forEach(d => DEV.push(d)); }
if (payload.PROD) { PROD.length = 0; payload.PROD.forEach(d => PROD.push(d)); }
if (payload.CATEGORIES) { CATEGORIES.length = 0; payload.CATEGORIES.forEach(c => CATEGORIES.push(c)); }
if (payload.COLLAPSED) { collapsedProds.clear(); payload.COLLAPSED.forEach(i => collapsedProds.add(i)); }
return true;
} catch(e) { return false; }
}

loadData();
renderCatFilter();renderKPIs();render();const _t=new Date();document.querySelector('.badge-today').textContent='矛聵陇毛聤聵 '+(_t.getMonth()+1)+'/'+_t.getDate();document.querySelector('.header-sub').textContent=_t.getFullYear()+'毛聟聞 '+(_t.getMonth()+1)+'矛聸聰 '+_t.getDate()+'矛聺录 锚赂掳矛陇聙';
</script>
